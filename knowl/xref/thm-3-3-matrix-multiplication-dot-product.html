<span class="type">Theorem</span><span class="space"> </span><span class="codenumber">1.4.2</span><span class="period">.</span>
</h4>
<div class="para logical">
<div class="para">If <span class="process-math">\(A\)</span> is <span class="process-math">\(m\times n\)</span> and <span class="process-math">\(B\)</span> is <span class="process-math">\(n\times k\text{,}\)</span> then the <span class="process-math">\((i,j)\)</span>-entry of <span class="process-math">\(AB\)</span> is the dot product of row <span class="process-math">\(i\)</span> of <span class="process-math">\(A\)</span> with column <span class="process-math">\(j\)</span> of <span class="process-math">\(B\text{:}\)</span>
</div>
<div class="displaymath process-math">
\begin{equation*}
(AB)_{ij}=\sum_{\ell=1}^{n}a_{i\ell}b_{\ell j}.
\end{equation*}
</div>
