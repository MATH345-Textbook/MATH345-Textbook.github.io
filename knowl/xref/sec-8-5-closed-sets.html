</h5>
<div class="para">A set <span class="process-math">\(S \subset \R^n\)</span> is called <dfn class="terminology">closed</dfn> if it contains its boundary. A set <span class="process-math">\(S \subset \R^n\)</span> is <dfn class="terminology">bounded</dfn> if it is contained in some ball centered at the origin, or equivalently if all points of <span class="process-math">\(S\)</span> lie within some fixed distance of the origin.<div class="autopermalink" data-description="Paragraph"><a href="#sec-8-5-closed-sets-2-1" title="Copy heading and permalink for Paragraph">🔗</a></div>
</div>
