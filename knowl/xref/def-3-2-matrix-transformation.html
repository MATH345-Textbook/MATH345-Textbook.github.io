<article class="definition definition-like"><h4 class="heading">
<span class="type">Definition</span><span class="space"> </span><span class="codenumber">1.3.14</span><span class="period">.</span><span class="space"> </span><span class="title">Matrix map.</span>
</h4>
<div class="para logical">
<div class="para">Given an <span class="process-math">\(m\times n\)</span> matrix <span class="process-math">\(A\text{,}\)</span> the <dfn class="terminology">matrix map</dfn> induced by <span class="process-math">\(A\)</span> is the function <span class="process-math">\(T_A:\mathbb R^n\to\mathbb R^m\)</span> defined by</div>
<div class="displaymath process-math">
\begin{equation*}
T_A(\mathbf{x})=A\mathbf{x}.
\end{equation*}
</div>
