<article class="definition definition-like"><h4 class="heading">
<span class="type">Definition</span><span class="space"> </span><span class="codenumber">1.1.12</span><span class="period">.</span><span class="space"> </span><span class="title">The Dot Product.</span>
</h4>
<div class="para logical">
<div class="para">The <dfn class="terminology">dot product</dfn> of two <span class="process-math">\(n\)</span>-vectors <span class="process-math">\(\mathbf{v} = (v_1,\dots,v_n)\)</span> and <span class="process-math">\(\mathbf{w} = (w_1,\dots,w_n)\)</span> is the scalar quantity</div>
<div class="displaymath process-math">
\begin{equation*}
\mathbf{v} \cdot \mathbf{w} = v_1 w_1 + \cdots + v_n w_n\text{.}
\end{equation*}
</div>
</div></article><span class="incontext"><a class="internal" href="sec-vector-geometry.html#def-1-1-dot-product">in-context</a></span>
