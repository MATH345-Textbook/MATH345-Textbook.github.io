<article class="theorem theorem-like"><h4 class="heading">
<span class="type">Theorem</span><span class="space"> </span><span class="codenumber">8.1.15</span><span class="period">.</span>
</h4>
<div class="para">Let <span class="process-math">\(f(x,y)\)</span> be a function with continuous partial derivatives. If <span class="process-math">\((a,b)\)</span> is a point where <span class="process-math">\(\nabla f(a,b) \neq \mathbf{0}\text{,}\)</span> then <span class="process-math">\(\nabla f(a,b)\)</span> is <dfn class="terminology">perpendicular to the level curve</dfn> of <span class="process-math">\(f\)</span> passing through the point <span class="process-math">\((a,b)\text{.}\)</span>
</div></article><span class="incontext"><a class="internal" href="sec-partial-derivatives.html#thm-8-5-level-curve-perpendicular">in-context</a></span>
