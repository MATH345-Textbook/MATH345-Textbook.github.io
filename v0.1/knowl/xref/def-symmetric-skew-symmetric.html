<div class="para logical">
<div class="para">A matrix <span class="process-math">\(A\)</span> with real entries is called:</div>
<ul class="disc" id="def-symmetric-skew-symmetric-2-1-2">
<li><div class="para">
<dfn class="terminology">Symmetric</dfn> if <span class="process-math">\(A^T = A\text{.}\)</span>
</div></li>
<li><div class="para">
<dfn class="terminology">Skew-symmetric</dfn> if <span class="process-math">\(A^T = -A\text{.}\)</span>
</div></li>
</ul>
