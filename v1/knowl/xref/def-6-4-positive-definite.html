<article class="definition definition-like"><h4 class="heading">
<span class="type">Definition</span><span class="space"> </span><span class="codenumber">5.4.6</span><span class="period">.</span><span class="space"> </span><span class="title">Positive Definite Matrices.</span>
</h4>
<div class="para">An <span class="process-math">\(n \times n\)</span> matrix <span class="process-math">\(A\)</span> is <dfn class="terminology">positive definite</dfn> if it is symmetric, and if <span class="process-math">\(\mathbf{x}^T A \mathbf{x} &gt; 0\)</span> for all <span class="process-math">\(\mathbf{x} \neq 0\text{.}\)</span>
</div></article><span class="incontext"><a class="internal" href="sec-inner-product-spaces.html#def-6-4-positive-definite">in-context</a></span>
