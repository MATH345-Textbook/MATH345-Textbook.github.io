<article class="theorem theorem-like"><h3 class="heading">
<span class="type">Theorem</span><span class="space"> </span><span class="codenumber">1.4.7</span><span class="period">.</span>
</h3>
<div class="para">Consider two linear systems each of <span class="process-math">\(m\)</span> equations in <span class="process-math">\(n\)</span> unknowns. If the augmented matrices <span class="process-math">\([A \mid \mathbf{b}]\)</span> and <span class="process-math">\([C \mid \mathbf{d}]\)</span> are <em class="emphasis">row equivalent</em>, then the linear systems are <dfn class="terminology">equivalent</dfn>, i.e. the systems have the same solutions.</div></article><span class="incontext"><a class="internal" href="sec-gaussian-elimination.html#thm-equivalent-row-ops">in-context</a></span>
