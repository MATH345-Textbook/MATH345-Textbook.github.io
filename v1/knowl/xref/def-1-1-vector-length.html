<article class="definition definition-like"><h4 class="heading">
<span class="type">Definition</span><span class="space"> </span><span class="codenumber">1.1.5</span><span class="period">.</span><span class="space"> </span><span class="title">The Length of a Vector.</span>
</h4>
<div class="para logical">
<div class="para">The <dfn class="terminology">length</dfn> of a vector <span class="process-math">\(\mathbf{v} = (v_1,\dots,v_n)\)</span> is the quantity</div>
<div class="displaymath process-math">
\begin{equation*}
\| \mathbf{v} \| = \sqrt{ v_1^2 + \cdots + v_n^2 }\text{.}
\end{equation*}
</div>
</div></article><span class="incontext"><a class="internal" href="sec-vector-geometry.html#def-1-1-vector-length">in-context</a></span>
